name: SonarQube Cloud Quality Gate

on:
  push:
    branches:
      - main
      - develop
      - "leonardo/**"
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonarsource-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarsource:
    name: Vitest coverage, build y SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout completo para SonarQube Cloud
        # actions/checkout@v5 pinned to a full commit SHA for SonarCloud.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Node.js
        # actions/setup-node@v5 pinned to a full commit SHA for SonarCloud.
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci --no-audit

      - name: Verificar configuracion local
        run: npm run quality:preflight

      - name: Ejecutar pruebas unitarias con cobertura LCOV
        run: npm run test:coverage

      - name: Verificar que exista coverage/lcov.info
        run: |
          test -f coverage/lcov.info
          echo "LCOV generado correctamente: coverage/lcov.info"

      - name: Build de produccion
        run: npm run build

      - name: Publicar cobertura como artefacto
        if: always()
        # actions/upload-artifact@v5 pinned to a full commit SHA for SonarCloud.
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: coverage-lcov
          path: |
            coverage/lcov.info
            coverage/**/*.html
            coverage/**/*.json
          if-no-files-found: warn
          retention-days: 14

      - name: Validar secretos de SonarQube Cloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Falta configurar el secret SONAR_TOKEN en GitHub: Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Secret SONAR_TOKEN detectado."

      - name: Analisis SonarQube Cloud
        # SonarSource/sonarqube-scan-action@v6 pinned to a full commit SHA for SonarCloud.
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ github.token }}
