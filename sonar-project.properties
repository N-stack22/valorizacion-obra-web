# SonarSource / SonarQube Cloud configuration
# Repositorio GitHub: https://github.com/N-stack22/valorizacion-obra-web
# Proyecto: Sistema Web de Valorizacion de Obra

# Para SonarQube Cloud, verifica estos dos valores en SonarSource.
# Si SonarSource crea otros identificadores, cambia SOLO estas dos propiedades.
sonar.organization=n-stack22
sonar.projectKey=n-stack22_valorizacion-obra-web
sonar.projectName=Sistema Web de Valorizacion de Obra
sonar.projectVersion=1.0.0
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# Codigo fuente que sera analizado.
# src: aplicacion React/Vite y logica de dominio.
sonar.sources=src

# Pruebas incluidas para trazabilidad tecnica.
sonar.tests=src,e2e,tests
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,e2e/**/*.spec.ts,tests/**/*.js

# Artefactos, documentacion pesada, dependencias, migraciones historicas y codigo generado que no deben analizarse.
sonar.exclusions=dist/**,.output/**,.vinxi/**,coverage/**,playwright-report/**,test-results/**,node_modules/**,docs/estado-del-arte/**,public/docs/**,reports/**,supabase/**,**/supabase/**,**/supabase/migrations/**,**/*.sql,src/**/*.test.ts,src/**/*.test.tsx,src/components/ui/**,src/routeTree.gen.ts,src/integrations/supabase/types.ts,**/*.d.ts

# La cobertura se concentra en la logica critica del sistema.
# UI, rutas, tipos generados, configuracion y migraciones no reducen el porcentaje de cobertura.
sonar.coverage.exclusions=src/main.tsx,src/router.tsx,src/routes/**,src/components/**,src/hooks/**,src/integrations/**,src/routeTree.gen.ts,src/**/*.test.ts,src/**/*.test.tsx,e2e/**,tests/k6/**,supabase/**,**/supabase/**,**/supabase/migrations/**,**/*.sql,**/*.config.js,**/*.config.ts,**/*.d.ts
# La duplicacion en JSX/rutas es principalmente composicion declarativa de UI.
# La logica de dominio en src/lib sigue entrando al calculo CPD.
sonar.cpd.exclusions=src/integrations/supabase/types.ts,src/components/ui/**,src/components/app/**,src/routes/**,src/routeTree.gen.ts,supabase/**,supabase/migrations/**,**/supabase/**,**/supabase/migrations/**,**/*.sql

# Cobertura producida por Vitest/V8.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Publica el analisis sin bloquear CI por el Quality Gate inicial.
# Cuando la deuda inicial este controlada, cambia a true para hacerlo obligatorio.
sonar.qualitygate.wait=false
sonar.qualitygate.timeout=300
