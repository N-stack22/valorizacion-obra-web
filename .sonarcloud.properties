# SonarQube Cloud Automatic Analysis configuration.
# Automatic Analysis ignores sonar-project.properties, so keep this file in sync
# with the CI scanner scope without using wildcard patterns.

sonar.sources=src
sonar.tests=e2e,tests

sonar.exclusions=.github,scripts,supabase,docs/estado-del-arte,public/docs,reports,dist,.output,.vinxi,coverage,playwright-report,test-results,node_modules,src/routeTree.gen.ts,src/integrations/supabase/types.ts

sonar.cpd.exclusions=.github,scripts,supabase,src/components,src/routes,src/hooks,src/integrations,src/routeTree.gen.ts,e2e,tests

sonar.sourceEncoding=UTF-8
